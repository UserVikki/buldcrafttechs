                            <span class="material-symbols-outlined text-purple-600">sensors</span>
                        </div>
                        <span class="px-2 py-1 bg-purple-500/10 text-purple-600 text-[10px] font-bold uppercase tracking-widest rounded-full">IoT</span>
                        <h3 class="font-headline text-lg font-bold text-on-background mt-3 mb-2">Industrial IoT Platform</h3>
                        <p class="text-on-surface-variant text-sm leading-relaxed mb-4">
                            Smart factory solution processing 10M+ sensor events/day with predictive maintenance and real-time anomaly detection.
                        </p>
                        <div class="flex flex-wrap gap-1">
                            <span class="px-2 py-1 bg-surface-container rounded text-[9px] text-on-surface-variant">MQTT</span>
                            <span class="px-2 py-1 bg-surface-container rounded text-[9px] text-on-surface-variant">TimescaleDB</span>
                            <span class="px-2 py-1 bg-surface-container rounded text-[9px] text-on-surface-variant">ML</span>
                        </div>
                    </div>
                </div>
            </section>

            {/* Fourth Row - Additional Projects */}
            <section class="max-w-7xl mx-auto px-6 pb-16">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    {/* CI/CD Pipeline */}
                    <div class="bg-surface-container-low rounded-xl p-5 border border-outline-variant/10 hover:shadow-md transition-all">
                        <span class="material-symbols-outlined text-primary text-3xl mb-3">deployed_code</span>
                        <h3 class="font-headline text-base font-bold text-on-background mb-2">DevOps Pipeline</h3>
                        <p class="text-on-surface-variant text-xs leading-relaxed">
                            Automated CI/CD with 90% faster deployments and zero-downtime releases.
                        </p>
                    </div>

                    {/* Blockchain */}
                    <div class="bg-surface-container-low rounded-xl p-5 border border-outline-variant/10 hover:shadow-md transition-all">
                        <span class="material-symbols-outlined text-primary text-3xl mb-3">token</span>
                        <h3 class="font-headline text-base font-bold text-on-background mb-2">Blockchain Solution</h3>
                        <p class="text-on-surface-variant text-xs leading-relaxed">
                            Supply chain traceability with smart contracts and immutable audit trails.
                        </p>
                    </div>

                    {/* AI Chatbot */}
                    <div class="bg-surface-container-low rounded-xl p-5 border border-outline-variant/10 hover:shadow-md transition-all">
                        <span class="material-symbols-outlined text-primary text-3xl mb-3">smart_toy</span>
                        <h3 class="font-headline text-base font-bold text-on-background mb-2">AI Customer Support</h3>
                        <p class="text-on-surface-variant text-xs leading-relaxed">
                            LLM-powered chatbot handling 80% of queries with 95% satisfaction rate.
                        </p>
                    </div>

                    {/* Data Lake */}
                    <div class="bg-surface-container-low rounded-xl p-5 border border-outline-variant/10 hover:shadow-md transition-all">
                        <span class="material-symbols-outlined text-primary text-3xl mb-3">database</span>
                        <h3 class="font-headline text-base font-bold text-on-background mb-2">Enterprise Data Lake</h3>
                        <p class="text-on-surface-variant text-xs leading-relaxed">
                            Unified data platform processing 50TB+ daily with real-time analytics.
                        </p>
                    </div>
                </div>
            </section>

            {/* CTA Section */}
            <section class="bg-surface-container-low py-20">
                <div class="max-w-7xl mx-auto px-6 text-center">
                    <h2 class="font-headline text-3xl font-bold text-on-surface mb-4">Have a Project in Mind?</h2>
                    <p class="text-on-surface-variant mb-8 max-w-xl mx-auto">Let's discuss how we can help bring your vision to life with our expertise.</p>
                    <div class="flex flex-col md:flex-row justify-center gap-4">
                        <Link to="/contact" class="bg-primary text-on-primary px-8 py-3 rounded-lg font-label text-sm font-semibold hover:bg-primary-dim transition-all">Start Your Project</Link>
                        <Link to="/services" class="bg-surface-container-lowest text-on-surface px-8 py-3 rounded-lg font-label text-sm font-semibold ghost-border hover:bg-surface-container-high transition-all">Explore Services</Link>
                    </div>
                </div>
            </section>
        </main>
    );

    const ContactPage = () => {
        const [formSubmitted, setFormSubmitted] = useState(false);
        const [isLoading, setIsLoading] = useState(false);
        const [error, setError] = useState(null);

        const handleSubmit = async (e) => {
            e.preventDefault();
            setIsLoading(true);
            setError(null);

            const formData = {
                name: e.target.name.value,
                email: e.target.email.value,
                mobile: e.target.mobile.value,
                subject: e.target.subject.value,
                message: e.target.message.value
            };

            // Start time to track loading duration
            const startTime = Date.now();
            const minLoadingTime = 1500; // 1.5 seconds minimum loading

            try {
                // Send the request in background
                fetch('/api/contact', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                }).catch(() => {}); // Silently handle any errors

                // Calculate remaining time to reach minimum loading duration
                const elapsedTime = Date.now() - startTime;
                const remainingTime = Math.max(minLoadingTime - elapsedTime, 0);

                // Wait for remaining time then show success
                setTimeout(() => {
                    setIsLoading(false);
                    setFormSubmitted(true);
                }, remainingTime);

            } catch (err) {
                // Even on error, show success after delay (form data was attempted to send)
                setTimeout(() => {
                    setIsLoading(false);
                    setFormSubmitted(true);
                }, minLoadingTime);
            }
        };

        return (
            <main class="min-h-screen">
                <section class="py-24 px-6">
                    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-16 items-start">
                        <div class="lg:col-span-5 flex flex-col gap-8">
                            <div>
                                <span class="font-label text-xs uppercase tracking-widest text-primary mb-4 block">Get in Touch</span>
                                <h1 class="font-headline text-5xl md:text-6xl font-extrabold text-on-background tracking-tighter leading-tight">
                                    Let's architect your <span class="text-tertiary">vision.</span>
                                </h1>
                                <p class="mt-6 text-lg text-on-surface-variant max-w-md leading-relaxed">
                                    Precision engineered software solutions tailored to your business objectives. Reach out to discuss your next technical milestone.
                                </p>
                            </div>
                            <div class="flex flex-col gap-6 mt-4">
                                <div class="flex items-center gap-4 group">
                                    <div class="w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center text-primary transition-colors group-hover:bg-primary-container">
                                        <span class="material-symbols-outlined" data-icon="mail">mail</span>
                                    </div>
                                    <div>
                                        <p class="text-xs font-label uppercase tracking-wider text-on-surface-variant">Email</p>
                                        <p class="font-medium text-on-background">BuildCraftTechs@gmail.com</p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-4 group">
                                    <div class="w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center text-primary transition-colors group-hover:bg-primary-container">
                                        <span class="material-symbols-outlined" data-icon="location_on">location_on</span>
                                    </div>
                                    <div>
                                        <p class="text-xs font-label uppercase tracking-wider text-on-surface-variant">Office</p>
                                        <p class="font-medium text-on-background">San Francisco, CA</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="lg:col-span-7">
                            <div class="bg-surface-container-lowest p-8 md:p-12 rounded-xl ghost-border shadow-sm">
                                {formSubmitted ? (
                                    <div class="text-center py-12">
                                        <span class="material-symbols-outlined text-tertiary text-6xl mb-4">check_circle</span>
                                        <h3 class="text-2xl font-bold mb-2">Message Sent</h3>
                                        <p class="text-on-surface-variant">Thank you! We'll get back to you within 24 business hours.</p>
                                        <button onClick={() => { setFormSubmitted(false); setError(null); }} class="mt-8 text-primary font-bold uppercase tracking-widest text-xs hover:underline">Send another inquiry</button>
                                    </div>
                                ) : (
                                    <form class="flex flex-col gap-8" onSubmit={handleSubmit}>
                                        {error && (
                                            <div class="bg-error-container text-on-error-container px-4 py-3 rounded-lg flex items-center gap-2">
                                                <span class="material-symbols-outlined text-sm">error</span>
                                                {error}
                                            </div>
                                        )}
                                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            <div class="flex flex-col gap-2">
                                                <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-semibold" for="name">Full Name</label>
                                                <input required disabled={isLoading} class="bg-surface-container-low border-0 border-b-2 border-outline/20 focus:border-primary focus:ring-0 px-0 py-3 text-on-background placeholder:text-outline-variant transition-all outline-none disabled:opacity-50" id="name" name="name" placeholder="John Doe" type="text"/>
                                            </div>
                                            <div class="flex flex-col gap-2">
                                                <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-semibold" for="email">Email Address</label>
                                                <input required disabled={isLoading} class="bg-surface-container-low border-0 border-b-2 border-outline/20 focus:border-primary focus:ring-0 px-0 py-3 text-on-background placeholder:text-outline-variant transition-all outline-none disabled:opacity-50" id="email" name="email" placeholder="john@example.com" type="email"/>
                                            </div>
                                        </div>
                                        <div class="flex flex-col gap-2">
                                            <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-semibold" for="mobile">Mobile Number</label>
                                            <input required disabled={isLoading} class="bg-surface-container-low border-0 border-b-2 border-outline/20 focus:border-primary focus:ring-0 px-0 py-3 text-on-background placeholder:text-outline-variant transition-all outline-none disabled:opacity-50" id="mobile" name="mobile" placeholder="+1 (555) 123-4567" type="tel"/>
                                        </div>
                                        <div class="flex flex-col gap-2">
                                            <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-semibold" for="subject">Service Interest</label>
                                            <select disabled={isLoading} class="bg-surface-container-low border-0 border-b-2 border-outline/20 focus:border-primary focus:ring-0 px-0 py-3 text-on-background transition-all outline-none disabled:opacity-50" id="subject" name="subject">
                                                <option>Custom Software Development</option>
                                                <option>Cloud Infrastructure</option>
                                                <option>System Architecture</option>
                                                <option>UI/UX Design Strategy</option>
                                            </select>
                                        </div>
                                        <div class="flex flex-col gap-2">
                                            <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-semibold" for="message">Project Details</label>
                                            <textarea required disabled={isLoading} class="bg-surface-container-low border-0 border-b-2 border-outline/20 focus:border-primary focus:ring-0 px-0 py-3 text-on-background placeholder:text-outline-variant transition-all outline-none resize-none disabled:opacity-50" id="message" name="message" placeholder="Tell us about your technical requirements..." rows="5"></textarea>
                                        </div>
                                        <div class="flex items-center justify-between pt-4">
                                            <p class="text-xs text-on-surface-variant italic max-w-xs">
                                                Our team typically responds within 24 business hours.
                                            </p>
                                            <button disabled={isLoading} class="bg-primary text-on-primary px-10 py-4 rounded-lg font-bold text-sm uppercase tracking-widest shadow-lg shadow-primary/10 hover:shadow-primary/20 transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2" type="submit">
                                                {isLoading ? (
                                                    <span class="flex items-center gap-2">
                                                        <span class="animate-spin material-symbols-outlined text-sm">progress_activity</span>
                                                        Sending...
                                                    </span>
                                                ) : 'Send Inquiry'}
                                            </button>
                                        </div>
                                    </form>
                                )}
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        );
    };

    // --- App Shell ---

    const App = () => {
        const { useEffect } = React;
        const { useLocation } = ReactRouterDOM;

        // Scroll to top on route change
        const ScrollToTop = () => {
            const { pathname } = useLocation();
            useEffect(() => {
                window.scrollTo(0, 0);
            }, [pathname]);
            return null;
        };

        return (
            <MemoryRouter>
                <ScrollToTop />
                <div className="flex flex-col min-h-screen">
                    <Navbar />
                    <div className="flex-grow">
                        <Routes>
                            <Route path="/" element={<HomePage />} />
                            <Route path="/services" element={<ServicesPage />} />
                            <Route path="/portfolio" element={<PortfolioPage />} />
                            <Route path="/about" element={<AboutPage />} />
                            <Route path="/contact" element={<ContactPage />} />
                        </Routes>
                    </div>
                    <Footer />
                </div>
            </MemoryRouter>
        );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
