<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>BuildCraftTechs | Precision Engineered Software Architecture</title>

    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                "primary":                  "var(--c-accent)",
                "primary-dim":              "#059669",
                "on-primary":               "#000000",
                "background":               "var(--c-bg)",
                "surface":                  "var(--c-surface)",
                "surface-container-lowest": "var(--c-card)",
                "surface-container-low":    "var(--c-card)",
                "surface-container":        "var(--c-card2)",
                "surface-container-high":   "var(--c-card2)",
                "surface-container-highest":"var(--c-card2)",
                "on-background":            "var(--c-text)",
                "on-surface":               "var(--c-text)",
                "on-surface-variant":       "var(--c-text-sub)",
                "tertiary":                 "var(--c-accent)",
                "outline":                  "var(--c-border-accent)",
                "outline-variant":          "var(--c-border)",
                "error":                    "#f87171",
                "on-error":                 "#000000"
              },
              borderRadius: {
                "DEFAULT": "0.125rem",
                "lg":   "0.375rem",
                "xl":   "0.625rem",
                "full": "9999px"
              },
              fontFamily: {
                "headline": ["Manrope"],
                "body":     ["Inter"],
                "label":    ["Inter"]
              }
            }
          }
        }
    </script>
    <style>
        /* ── Light mode (default) ── */
        body {
            --c-bg:           #ffffff;
            --c-surface:      #f7f7f7;
            --c-card:         #f0f0f0;
            --c-card2:        #e8e8e8;
            --c-text:         #000000;
            --c-text-sub:     rgba(0,0,0,0.5);
            --c-text-muted:   rgba(0,0,0,0.28);
            --c-accent:       #10B981;
            --c-border:       rgba(0,0,0,0.08);
            --c-border-accent:rgba(16,185,129,0.25);
            --c-accent-bg:    rgba(16,185,129,0.1);
            --c-navbar:       rgba(255,255,255,0.92);
            --c-navbar-border:rgba(0,0,0,0.07);
            --c-glow:         rgba(16,185,129,0.05);
        }
        /* ── Dark mode ── */
        body.dark {
            --c-bg:           #000000;
            --c-surface:      #050505;
            --c-card:         #0a0a0a;
            --c-card2:        #111111;
            --c-text:         #ffffff;
            --c-text-sub:     rgba(255,255,255,0.5);
            --c-text-muted:   rgba(255,255,255,0.25);
            --c-accent:       #10B981;
            --c-border:       rgba(255,255,255,0.06);
            --c-border-accent:rgba(16,185,129,0.15);
            --c-accent-bg:    rgba(16,185,129,0.08);
            --c-navbar:       rgba(0,0,0,0.92);
            --c-navbar-border:rgba(16,185,129,0.12);
            --c-glow:         rgba(16,185,129,0.04);
        }

        .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
        .ghost-border { border: 1px solid var(--c-border-accent); }
        .subtle-border { border: 1px solid var(--c-border); }

        body { font-family:'Inter',sans-serif; background: var(--c-bg); color: var(--c-text); }
        h1,h2,h3,h4,h5,h6 { font-family:'Manrope',sans-serif; }
        ::selection { background: rgba(16,185,129,0.25); }

        /* Smooth theme transition */
        *, *::before, *::after {
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }
        /* Don't animate layout/transform/opacity — only colors */
        * { transition-property: background-color, border-color, color; }
    </style>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/history@5/umd/history.development.js"></script>
    <script src="https://unpkg.com/react-router@6.3.0/umd/react-router.development.js"></script>
    <script src="https://unpkg.com/react-router-dom@6.3.0/umd/react-router-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body>
<!-- Apply saved theme before React renders to avoid flash -->
<script>
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
    }
</script>
<div id="root"></div>
<script>
    async function loadComponents() {
        const files = [
            'components/Navbar.js','components/Footer.js','components/HomePage.js',
            'components/ServicesPage.js','components/PortfolioPage.js',
            'components/AboutPage.js','components/ContactPage.js','components/App.js'
        ];
        for (const file of files) {
            try {
                const code = await (await fetch(file)).text();
                eval(Babel.transform(code, { presets: ['react'] }).code);
            } catch (e) { console.error('Error loading ' + file + ':', e); }
        }
    }
    loadComponents();
</script>
</body>
</html>
